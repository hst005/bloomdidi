services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bloomdidi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bloomdidi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bloomdidi_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-bloomdidi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloomdidi} -d ${POSTGRES_DB:-bloomdidi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bloomdidi-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
